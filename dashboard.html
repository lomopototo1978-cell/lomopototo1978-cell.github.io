<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MVUMI Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --yellow: #FFE500;
      --black: #000;
      --paper: #FAFAFA;
      --error: #FF2D2D;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Space Mono", monospace; }
    body {
      min-height: 100vh;
      background: var(--yellow);
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .dash {
      width: min(760px, 100%);
      border: 4px solid var(--black);
      background: var(--paper);
      box-shadow: 8px 8px 0 var(--black);
      padding: 28px;
    }
    h1 {
      font-family: "Bebas Neue", sans-serif;
      font-size: 56px;
      line-height: 0.9;
      margin-bottom: 12px;
    }
    .email {
      margin-bottom: 18px;
      font-weight: 700;
    }
    .panel {
      border: 4px solid var(--black);
      background: #fff;
      padding: 16px;
      margin-bottom: 16px;
    }
    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button, a.btn {
      border: 4px solid var(--black);
      background: var(--black);
      color: var(--yellow);
      text-decoration: none;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 5px 5px 0 var(--black);
    }
    button:hover, a.btn:hover {
      background: var(--yellow);
      color: var(--black);
    }
    .status {
      margin-top: 8px;
      color: var(--error);
      font-weight: 700;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <main class="dash">
    <h1>MVUMI<br/>DASHBOARD</h1>
    <p class="email" id="userEmail">Checking session...</p>

    <section class="panel">
      <p>Protected route is active. Only authenticated users can stay here.</p>
      <div class="actions" style="margin-top:10px;">
        <a class="btn" href="index.html">Back To Login</a>
        <button id="logoutBtn" type="button">LOGOUT</button>
      </div>
      <p class="status" id="status"></p>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

    const userEmail = document.getElementById("userEmail");
    const logoutBtn = document.getElementById("logoutBtn");
    const statusEl = document.getElementById("status");

    const firebaseConfig = {
      apiKey: "AIzaSyAIg5vDWb-7IAx583dNryfJ-EGWK8OQ71A",
      authDomain: "mvumi-c32dd.firebaseapp.com",
      projectId: "mvumi-c32dd",
      storageBucket: "mvumi-c32dd.firebasestorage.app",
      messagingSenderId: "451539592305",
      appId: "1:451539592305:web:e57c4270ac365f2d68a7d0",
      measurementId: "G-KKP6SWP4X5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.replace("index.html");
        return;
      }
      userEmail.textContent = "SIGNED IN AS: " + user.email;
    });

    logoutBtn.addEventListener("click", async () => {
      statusEl.textContent = "Logging out...";
      try {
        await signOut(auth);
        window.location.replace("index.html");
      } catch (error) {
        statusEl.textContent = "LOGOUT FAILED: " + (error.code || "UNKNOWN_ERROR");
      }
    });
  </script>
</body>
</html>
