<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MR Biker | Motorcycle Parcel Delivery - Harare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== FULL-SCREEN MAP ===== -->
  <div id="rideMap"></div>

  <!-- Center pin -->
  <div class="center-pin">
    <div class="pin-dot"></div>
    <div class="pin-pulse"></div>
  </div>

  <!-- GPS button -->
  <button class="gps-btn" id="gpsBtn" type="button" aria-label="My location">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M12 2v2m0 16v2M2 12h2m16 0h2" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <circle cx="12" cy="12" r="5" stroke="#fff" stroke-width="2"/>
      <circle cx="12" cy="12" r="1.5" fill="#fff"/>
    </svg>
  </button>

  <!-- Back button -->
  <button class="back-btn" id="backBtn" type="button" aria-label="Back">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M19 12H5M12 19l-7-7 7-7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <!-- ===== BOTTOM SHEET ===== -->
  <div class="bottom-sheet" id="bottomSheet">
    <div class="sheet-handle"><span></span></div>

    <div class="location-block" id="addressBar">
      <div class="addr-connector">
        <span class="addr-dot-big addr-dot-green"></span>
        <span class="addr-line"></span>
        <span class="addr-dot-big addr-dot-red"></span>
      </div>
      <div class="addr-fields">
        <div class="field-wrap">
          <div class="addr-row">
            <input id="pickupInput" type="text" placeholder="Pickup location" autocomplete="off" />
            <button id="useMyLocationBtn" type="button" class="addr-action-btn" title="Use my location">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M12 2v2m0 16v2M2 12h2m16 0h2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
              </svg>
            </button>
          </div>
          <p class="inline-error" id="pickupError" aria-live="polite"></p>
          <ul class="suggestions" id="pickupSuggestions"></ul>
        </div>

        <div class="addr-divider"></div>

        <div class="field-wrap">
          <div class="addr-row">
            <input id="dropoffInput" type="text" placeholder="Where to?" autocomplete="off" />
            <span class="addr-eta" id="addrEta"></span>
          </div>
          <p class="inline-error" id="dropoffError" aria-live="polite"></p>
          <ul class="suggestions" id="dropoffSuggestions"></ul>
        </div>
      </div>
    </div>

    <!-- Ride card -->
    <div class="ride-card hidden" id="routeCard">
      <div class="ride-icon">
        <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
          <circle cx="16" cy="16" r="15" stroke="#ff6b35" stroke-width="1.5"/>
          <path d="M10 22 L16 8 L22 22" stroke="#ff6b35" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="16" cy="14" r="2" fill="#ff6b35"/>
        </svg>
      </div>
      <div class="ride-info">
        <div class="ride-name">MR Biker</div>
        <div class="ride-meta"><span id="rcEta">--</span> &middot; <span id="rcDist">--</span></div>
        <div class="ride-sub">Motorcycle parcel delivery</div>
      </div>
    </div>

    <!-- Fare section -->
    <div class="fare-section">
      <button class="fare-adjust-btn" id="fareMinus" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
      <div class="fare-display">
        <div class="fare-amount-row">
          <strong class="fare-amount" id="fareValue">$3.00</strong>
          <span class="fare-original hidden" id="fareOriginal">$3.00</span>
        </div>
        <span class="fare-recommended" id="fareRecommended">Recommended fare: $3.00</span>
        <span class="fare-step">Adjust fare by +/- $0.50</span>
      </div>
      <button class="fare-adjust-btn" id="farePlus" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- Parcel description -->
    <div class="parcel-row">
      <input id="parcelDesc" type="text" placeholder="What are you sending? (e.g. documents, food...)" autocomplete="off" />
    </div>

    <!-- CTA Button -->
    <button id="sendParcelBtn" type="button" class="cta-btn" disabled>
      <span class="cta-btn-shimmer" aria-hidden="true"></span>
      <span class="cta-btn-content">
        <svg class="cta-icon" width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M5 12h14M12 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="cta-text" id="ctaText">Find a Rider</span>
      </span>
    </button>

    <div class="negotiation-card hidden" id="negotiationCard">
      <div class="negotiation-head">
        <strong>Rider Found Nearby</strong>
        <span class="negotiation-chip">~2 min away</span>
      </div>
      <p>Start negotiating with your offer of <strong id="negotiationFare">$3.00</strong>.</p>
    </div>

    <p class="sheet-status" id="mapStatus">Drag map to set pickup point</p>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="script.js"></script>
  <script>initMap();</script>
</body>
</html>
