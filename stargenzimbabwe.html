<!doctype html>
<!-- v3 ChatGPT-style light UI with local mini model -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Ask Star</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #0d0d0d;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 10;
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 16px;
      font-weight: 600;
      color: #0d0d0d;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #10a37f;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.85); }
    }

    .back-link {
      font-size: 13px;
      color: #666;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }

    .back-link:hover {
      background: #f0f0f0;
      color: #0d0d0d;
    }

    /* ── Feed ── */
    .feed {
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .feed-inner {
      max-width: 768px;
      margin: 0 auto;
      padding: 24px 24px 140px;
    }

    /* ── Messages ── */
    .msg {
      padding: 20px 0;
      animation: fadeSlide 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .msg + .msg {
      border-top: 1px solid #f0f0f0;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .msg.user .msg-row {
      flex-direction: row-reverse;
    }

    /* Avatar */
    .avatar {
      width: 30px; height: 30px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .msg.assistant .avatar {
      background: #10a37f;
      color: #fff;
    }

    .msg.user .avatar {
      background: #e8e8e8;
      color: #555;
    }

    /* Text */
    .msg-text {
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      flex: 1;
      min-width: 0;
    }

    .msg.user .msg-text {
      background: #f7f7f8;
      border-radius: 18px 18px 4px 18px;
      padding: 12px 16px;
      max-width: min(520px, calc(100vw - 100px));
    }

    .msg.assistant .msg-text {
      padding-top: 3px;
    }

    /* ── Streaming cursor ── */
    .streaming-cursor::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 18px;
      margin-left: 2px;
      background: #10a37f;
      border-radius: 1px;
      vertical-align: text-bottom;
      animation: blink 0.7s steps(2) infinite;
    }

    @keyframes blink {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── Typing dots ── */
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #999;
      animation: dotBounce 1s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%           { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Composer ── */
    .composer-area {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 12px 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, #fff 20%);
    }

    .composer-box {
      max-width: 768px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border: 1px solid #d9d9d9;
      border-radius: 24px;
      padding: 8px 12px 8px 16px;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    .composer-box:focus-within {
      border-color: #10a37f;
      box-shadow: 0 0 0 2px rgba(16,163,127,0.15), 0 2px 12px rgba(0,0,0,0.08);
    }

    .input-field {
      flex: 1;
      border: 0;
      outline: none;
      resize: none;
      font: inherit;
      font-size: 15px;
      line-height: 1.5;
      min-height: 24px;
      max-height: 200px;
      background: transparent;
      color: #0d0d0d;
      overflow-y: auto;
    }

    .input-field::placeholder { color: #999; }

    .send-btn {
      width: 36px; height: 36px;
      border: 0;
      border-radius: 50%;
      background: #0d0d0d;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.15s, opacity 0.15s;
    }

    .send-btn:hover:not(:disabled) {
      background: #10a37f;
      transform: scale(1.06);
    }

    .send-btn:active:not(:disabled) {
      transform: scale(0.92);
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .send-btn svg { width: 16px; height: 16px; }

    .composer-hint {
      max-width: 768px;
      margin: 6px auto 0;
      text-align: center;
      font-size: 11px;
      color: #aaa;
    }

    /* ── Scrollbar ── */
    .feed::-webkit-scrollbar       { width: 6px; }
    .feed::-webkit-scrollbar-track { background: transparent; }
    .feed::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
    .feed::-webkit-scrollbar-thumb:hover { background: #ccc; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .feed-inner { padding: 16px 14px 148px; }
      .msg-row    { gap: 10px; }
      .msg.user .msg-text { max-width: calc(100vw - 74px); }
      .composer-area { padding: 8px 10px; }
      .composer-box  { padding: 6px 10px 6px 14px; }
    }

    @media (hover: none) { *, a, button { cursor: default !important; } }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand"><span class="brand-dot"></span> Ask Star</div>
      <a class="back-link" href="dashboard.html">Dashboard</a>
    </header>

    <section id="feed" class="feed">
      <div id="feedInner" class="feed-inner"></div>
    </section>

    <div class="composer-area">
      <form id="composer" class="composer-box" autocomplete="off">
        <textarea id="prompt" class="input-field" rows="1" placeholder="Message Ask Star..."></textarea>
        <button id="send" class="send-btn" type="submit" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none"><path d="M7 11L12 6L17 11M12 6V18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>
      <p class="composer-hint">Enter to send &middot; Shift+Enter for new line &middot; /teach question =&gt; answer</p>
    </div>
  </main>

      {q:"What is the Zambezi River", a:"The Zambezi is the fourth-longest river in Africa at about 2,574 km. It flows through six countries and features Victoria Falls. Lake Kariba, the world's largest reservoir, is on the Zambezi."},

      // ── Solar System ──
      {q:"What is the solar system", a:"The Solar System is the gravitationally bound system of the Sun and the objects that orbit it. It formed about 4.6 billion years ago. The Sun contains 99.86% of the system's mass."},

        .replace(/tion$/, "t").replace(/sion$/, "s")
        .replace(/ness$/, "").replace(/ment$/, "")
        .replace(/ful$/, "").replace(/less$/, "")
        .replace(/ous$/, "").replace(/ive$/, "")
        .replace(/ing$/, "").replace(/ed$/, "")
        .replace(/ly$/, "").replace(/er$/, "").replace(/est$/, "")
        .replace(/s$/, "");
    }

    function tokenize(text) {
      return normalize(text).split(" ").filter(Boolean);
    }

    function buildIDF() {
      const df = {};
      const N = state.knowledge.length || 1;
      state.knowledge.forEach(item => {
        const seen = new Set(tokenize(item.q).map(stem));
        seen.forEach(t => { df[t] = (df[t] || 0) + 1; });
      });
      state.idf = {};
      Object.keys(df).forEach(t => {
        state.idf[t] = Math.log((N + 1) / (df[t] + 1)) + 1;
      });
    }

    function expandTokens(tokens) {
      const expanded = new Set();
      tokens.forEach(t => {
        const st = stem(t);
        expanded.add(st);
        expanded.add(t);
        const syns = SYNONYM_MAP[t] || SYNONYM_MAP[st];
        if (syns) syns.forEach(s => { expanded.add(s); expanded.add(stem(s)); });
      });
      return expanded;
    }

    function smartScore(inputTokens, questionTokens) {
      const iTokens = expandTokens(inputTokens);
      const qTokens = expandTokens(questionTokens);
      if (!iTokens.size || !qTokens.size) return 0;
      let matchWeight = 0, totalWeight = 0;
      /* Weigh input tokens by IDF */
      iTokens.forEach(t => {
        if (STOP_WORDS.has(t)) return;
        const w = state.idf[stem(t)] || 1;
        totalWeight += w;
        if (qTokens.has(t) || qTokens.has(stem(t))) matchWeight += w;
      });
      /* Also weigh question tokens */
      qTokens.forEach(t => {
        if (STOP_WORDS.has(t)) return;
        const w = state.idf[stem(t)] || 1;
        totalWeight += w;
        if (iTokens.has(t) || iTokens.has(stem(t))) matchWeight += w;
      });
      return totalWeight > 0 ? matchWeight / totalWeight : 0;
    }

    function bestLearnedAnswer(input) {
      const ni = normalize(input);
      if (!ni) return null;

      /* Handle follow-up questions using conversation context */
      let searchInput = input;
      const contentWords = tokenize(input).filter(t => !STOP_WORDS.has(t));
      if (state.context.length > 0 && contentWords.length <= 3) {
        const last = state.context[state.context.length - 1];
        if (/\b(it|that|this|they|them|there|its|more|also|else|about|and|too)\b/i.test(ni) || contentWords.length <= 2) {
          searchInput = last.user + " " + input;
        }
      }

      const inputTokens = tokenize(searchInput);
      let best = null, bestS = 0;

      state.knowledge.forEach(item => {
        const qTokens = tokenize(item.q);
        if (!qTokens.length) return;
        const exact = ni === normalize(item.q) ? 1 : 0;
        const s = Math.max(exact, smartScore(inputTokens, qTokens));
        if (s > bestS) { bestS = s; best = item; }
      });

      if (!best) return null;
      if (bestS >= 0.5) return best.a;
      if (bestS >= 0.35) return "I think: " + best.a;
      if (bestS >= 0.25) return "I'm not entirely sure, but: " + best.a;
      return null;
    }

    function handleTeachCommand(input) {
      const m = input.match(/^\s*\/teach\s+(.+?)\s*=>\s*(.+)\s*$/i);
      if (!m) return null;
      const q = m[1].trim(), a = m[2].trim();
      if (!q || !a) return "Use: /teach question => answer";
      const nq = normalize(q);
      const ex = state.knowledge.find(i => normalize(i.q) === nq);
      if (ex) ex.a = a; else state.knowledge.unshift({ q, a });
      saveKnowledge();
      return 'Learned: "' + q + '"';
    }

    function handleForgetCommand(input) {
      const m = input.match(/^\s*\/forget\s+(.+)\s*$/i);
      if (!m) return null;
      const q = m[1].trim(), nq = normalize(q), len = state.knowledge.length;
      state.knowledge = state.knowledge.filter(i => normalize(i.q) !== nq);
      saveKnowledge();
      return state.knowledge.length < len ? 'Forgot: "' + q + '"' : "Not found. Try /list";
    }

    function handleListCommand(input) {
      if (!/^\s*\/list\s*$/i.test(input)) return null;
      if (!state.knowledge.length) return "Nothing learned yet. Use /teach question => answer";
      return "Learned:\n" + state.knowledge.slice(0, 15).map((v, i) => (i + 1) + ". " + v.q).join("\n");
    }

    function getReply(input) {
      let r;
      if ((r = handleTeachCommand(input)))  return r;
      if ((r = handleForgetCommand(input))) return r;
      if ((r = handleListCommand(input)))   return r;

      /* Correction learning: "actually X" or "no, it's X" */
      const corrMatch = input.match(/^(?:actually|no,?\s*(?:it(?:'s| is)|the answer is))\s+(.+)/i);
      if (corrMatch && state.context.length > 0) {
        const lastQ = state.context[state.context.length - 1].user;
        const correctedA = corrMatch[1].trim();
        if (lastQ && correctedA) {
          const nq = normalize(lastQ);
          const ex = state.knowledge.find(i => normalize(i.q) === nq);
          if (ex) ex.a = correctedA; else state.knowledge.unshift({q: lastQ, a: correctedA});
          saveKnowledge();
          buildIDF();
          return 'Thanks for the correction! I\'ve updated my knowledge about "' + lastQ + '".';
        }
      }

      const n = normalize(input);
      if (/\b(hi|hello|hey|greetings|good morning|good afternoon|good evening|sup|yo)\b/.test(n)) {
        const greetings = ["Hey there! Ask me anything.", "Hello! What would you like to know?", "Hi! I'm ready to help. Ask away!", "Hey! Try asking me about Zimbabwe, science, history, or anything else."];
        return greetings[Math.floor(Math.random() * greetings.length)];
      }
      if (/\bhow are you\b/.test(n)) {
        const replies = ["I'm doing great, thanks for asking! What can I help you with?", "All good here! Ready to answer your questions.", "I'm running well! Ask me anything.", "Doing fine, thanks! Fire away with a question."];
        return replies[Math.floor(Math.random() * replies.length)];
      }
      if (/\b(what'?s up|whats up|wassup)\b/.test(n)) return "Not much — just here waiting for your questions! Ask me anything.";
      if (/\b(who are you|what are you|your name)\b/.test(n)) return "I'm Ask Star \u2014 a local mini model that runs in your browser. I come pre-loaded with knowledge about Zimbabwe, Africa, science, history, programming, and much more. You can also teach me new things!";
      if (/\b(how do you work|how were you made|how were you built)\b/.test(n)) return "I'm a local mini model that runs entirely in your browser using TF-IDF scoring, synonym expansion, and word stemming. I come pre-loaded with knowledge and you can teach me more!";
      if (/\b(thank|thanks|cheers)\b/.test(n)) return "You're welcome! Feel free to ask more questions.";
      if (/\b(bye|goodbye|see you|later)\b/.test(n)) return "Goodbye! Come back anytime.";
      if (/^(help|commands|\?)\s*$/i.test(n) || /\bhelp me\b/.test(n)) return "Commands:\n/teach question => answer \u2014 teach me something new\n/forget question \u2014 remove knowledge\n/list \u2014 see what I know\n\nOr just ask me a question! I know about Zimbabwe, Africa, science, history, geography, programming, and much more.\n\nTip: If I get something wrong, just say \"actually [correct answer]\" and I'll learn!";

      if ((r = bestLearnedAnswer(input))) return r;
      return "I don't know that yet. You can teach me with:\n/teach your question => your answer";
    }

    /* ── Escape HTML ── */
    function esc(v) {
      return String(v || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    /* ── Render all messages ── */
    function renderAll() {
      feedInner.innerHTML = "";
      state.messages.forEach(m => addMsgDom(m.role, m.content, false));
      if (state.thinking) addThinkingDom();
      scrollDown();
    }

    function addMsgDom(role, text, animate) {
      const article = document.createElement("article");
      article.className = "msg " + role;
      if (!animate) article.style.animation = "none";

      const row = document.createElement("div");
      row.className = "msg-row";

      const av = document.createElement("div");
      av.className = "avatar";
      av.textContent = role === "assistant" ? "\u2605" : sessionEmail.charAt(0).toUpperCase();

      const txt = document.createElement("div");
      txt.className = "msg-text";
      txt.innerHTML = esc(text);

      row.appendChild(av);
      row.appendChild(txt);
      article.appendChild(row);
      feedInner.appendChild(article);
      return txt;
    }

    function addThinkingDom() {
      const article = document.createElement("article");
      article.className = "msg assistant";
      article.id = "thinkingMsg";
      const row = document.createElement("div");
      row.className = "msg-row";
      const av = document.createElement("div");
      av.className = "avatar";
      av.textContent = "\u2605";
      const txt = document.createElement("div");
      txt.className = "msg-text";
      txt.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      row.appendChild(av);
      row.appendChild(txt);
      article.appendChild(row);
      feedInner.appendChild(article);
    }

    function removeThinking() {
      const el = document.getElementById("thinkingMsg");
      if (el) el.remove();
    }

    function scrollDown() {
      feed.scrollTop = feed.scrollHeight;
    }

    /* ── Word-by-word streaming animation (like ChatGPT) ── */
    async function streamReply(fullText) {
      removeThinking();

      const txtEl = addMsgDom("assistant", "", true);
      txtEl.classList.add("streaming-cursor");

      const words = fullText.split(/(\s+)/);
      let rendered = "";

      for (let i = 0; i < words.length; i++) {
        rendered += words[i];
        txtEl.innerHTML = esc(rendered);
        scrollDown();
        if (words[i].trim()) {
          await new Promise(r => setTimeout(r, 28 + Math.random() * 32));
        }
      }

      txtEl.classList.remove("streaming-cursor");
      state.messages.push({ role: "assistant", content: fullText });
    }

    /* ── Submit ── */
    async function handleSubmit() {
      const text = promptEl.value.trim();
      if (!text || state.thinking) return;

      state.messages.push({ role: "user", content: text });
      state.thinking = true;
      sendBtn.disabled = true;
      promptEl.value = "";
      autoResize();

      addMsgDom("user", text, true);
      addThinkingDom();
      scrollDown();

      await new Promise(r => setTimeout(r, 400 + Math.random() * 300));

      const reply = getReply(text);
      state.thinking = false;

      /* Track conversation context for follow-ups */
      state.context.push({user: text, bot: reply});
      if (state.context.length > 5) state.context.shift();

      await streamReply(reply);

      sendBtn.disabled = false;
      promptEl.focus();
    }

    /* ── Auto-resize textarea ── */
    function autoResize() {
      promptEl.style.height = "0px";
      promptEl.style.height = Math.min(promptEl.scrollHeight, 200) + "px";
    }

    /* ── Events ── */
    composer.addEventListener("submit", e => { e.preventDefault(); handleSubmit(); });
    promptEl.addEventListener("input", autoResize);
    promptEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSubmit(); }
    });

    /* ── Init ── */
    state.knowledge = loadKnowledge();
    buildIDF();
    state.messages.push({
      role: "assistant",
      content: "Try asking me something"
    });
    autoResize();
    renderAll();
  </script>
</body>
</html>
