<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ask Star</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --card: #ffffff;
      --line: rgba(122, 130, 184, 0.2);
      --accent: #5f56f5;
      --accent2: #30a4ff;
      --text: #172033;
      --muted: #617091;
      --input: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; }

    body {
      font-family: "Sora", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Animated aurora background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      animation: aurora 14s ease-in-out infinite alternate;
    }

    @keyframes aurora {
      0% {
        background:
          radial-gradient(ellipse at 18% 38%, rgba(95,86,245,0.12) 0%, transparent 55%),
          radial-gradient(ellipse at 82% 12%, rgba(48,164,255,0.12) 0%, transparent 50%),
          radial-gradient(ellipse at 42% 88%, rgba(115,157,255,0.1) 0%, transparent 48%);
      }
      50% {
        background:
          radial-gradient(ellipse at 62% 18%, rgba(95,86,245,0.13) 0%, transparent 52%),
          radial-gradient(ellipse at 24% 62%, rgba(48,164,255,0.12) 0%, transparent 50%),
          radial-gradient(ellipse at 78% 82%, rgba(115,157,255,0.1) 0%, transparent 48%);
      }
      100% {
        background:
          radial-gradient(ellipse at 82% 55%, rgba(95,86,245,0.11) 0%, transparent 55%),
          radial-gradient(ellipse at 14% 84%, rgba(48,164,255,0.12) 0%, transparent 50%),
          radial-gradient(ellipse at 52% 14%, rgba(115,157,255,0.1) 0%, transparent 48%);
      }
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      position: relative;
      z-index: 1;
    }

    /* ── Topbar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      padding: 16px 22px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .topbar::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 35%, var(--accent2) 65%, transparent 100%);
      background-size: 250% 100%;
      animation: shimmerLine 4s linear infinite;
    }

    @keyframes shimmerLine {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .brand {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.03em;
      background: linear-gradient(90deg, #c4b5fd, #7c5cfc, #60a5fa, #c4b5fd);
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: brandFlow 6s linear infinite;
    }

    @keyframes brandFlow {
      0%   { background-position: 0% 0; }
      100% { background-position: 300% 0; }
    }

    .back {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      padding: 6px 13px;
      border-radius: 9px;
      border: 1px solid rgba(95, 86, 245, 0.2);
      transition: color 0.18s, background 0.18s, border-color 0.18s, transform 0.18s;
    }

    .back:hover {
      color: var(--text);
      background: rgba(95, 86, 245, 0.1);
      border-color: rgba(95, 86, 245, 0.35);
      transform: translateX(-2px);
    }

    /* ── Feed ── */
    .feed {
      overflow-y: auto;
      padding: 32px 20px 152px;
      scroll-behavior: smooth;
    }

    .feed-inner {
      width: min(820px, 100%);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    /* ── Messages ── */
    .message {
      display: flex;
      width: 100%;
      animation: messageIn 0.42s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .message.user {
      justify-content: flex-end;
      padding-left: 12%;
    }

    .message.assistant {
      justify-content: flex-start;
      padding-right: 12%;
    }

    .content {
      max-width: min(68ch, calc(100vw - 88px));
      font-size: 15px;
      line-height: 1.78;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .content {
      background: linear-gradient(145deg, #6a62fb 0%, #2f9efe 100%);
      border: 1px solid rgba(95, 86, 245, 0.35);
      border-radius: 22px 22px 5px 22px;
      padding: 13px 18px;
      color: #ffffff;
      box-shadow: 0 7px 20px rgba(95, 86, 245, 0.22), inset 0 1px 0 rgba(255,255,255,0.24);
    }

    .message.assistant .content {
      background: var(--card);
      border: 1px solid rgba(48, 164, 255, 0.18);
      border-radius: 22px 22px 22px 5px;
      padding: 13px 18px;
      box-shadow: 0 6px 18px rgba(19, 34, 71, 0.09), inset 0 1px 0 rgba(255,255,255,0.7);
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.95);
        filter: blur(3px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    /* ── Typing indicator ── */
    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 2px;
    }

    .typing span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      animation: typingBounce 0.9s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.14s; }
    .typing span:nth-child(3) { animation-delay: 0.28s; }

    @keyframes typingBounce {
      0%, 80%, 100% { transform: translateY(0) scale(1);    opacity: 0.38; }
      40%            { transform: translateY(-9px) scale(1.18); opacity: 1; }
    }

    /* ── Composer ── */
    .composer-wrap {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      z-index: 6;
      padding: 16px 20px 24px;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.97) 18%, #ffffff 100%);
    }

    .composer {
      width: min(820px, 100%);
      margin: 0 auto;
      border: 1px solid var(--line);
      background: var(--input);
      border-radius: 26px;
      padding: 12px 12px 12px 18px;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      box-shadow: 0 10px 30px rgba(14, 31, 68, 0.12);
      transition: border-color 0.22s ease, box-shadow 0.22s ease;
    }

    .composer:focus-within {
      border-color: rgba(95, 86, 245, 0.5);
      box-shadow: 0 0 0 3px rgba(95, 86, 245, 0.14), 0 10px 30px rgba(14, 31, 68, 0.12);
    }

    .prompt {
      flex: 1;
      min-height: 24px;
      max-height: 220px;
      border: 0;
      outline: none;
      resize: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 16px;
      line-height: 1.6;
      overflow-y: auto;
    }

    .prompt::placeholder { color: #9aa5bd; }

    /* ── Send button ── */
    .send {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex: 0 0 auto;
      transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.2s ease, opacity 0.15s ease;
      animation: sendPulse 3s ease-in-out infinite;
    }

    .send:not(:disabled):hover {
      transform: scale(1.13) translateY(-1px);
      box-shadow: 0 6px 28px rgba(124, 92, 252, 0.6);
      animation: none;
    }

    .send:not(:disabled):active {
      transform: scale(0.9);
      box-shadow: none;
    }

    .send:disabled {
      opacity: 0.35;
      cursor: default;
      animation: none;
    }

    @keyframes sendPulse {
      0%,100% { box-shadow: 0 0 0  0 rgba(124,92,252,0.0); }
      50%      { box-shadow: 0 0 0 10px rgba(124,92,252,0.14); }
    }

    .send svg { width: 18px; height: 18px; }

    .footer-note {
      width: min(820px, 100%);
      margin: 8px auto 0;
      text-align: center;
      color: #7183a8;
      font-size: 11px;
    }

    /* ── Scrollbar ── */
    .feed::-webkit-scrollbar       { width: 4px; }
    .feed::-webkit-scrollbar-track { background: transparent; }
    .feed::-webkit-scrollbar-thumb { background: rgba(95,86,245,0.24); border-radius: 4px; }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .topbar         { padding: 14px 16px; }
      .feed           { padding: 20px 12px 152px; }
      .composer-wrap  { padding: 10px 12px 18px; }
      .composer       { padding-left: 14px; }
      .message.user,
      .message.assistant { padding-left: 0; padding-right: 0; }
      .content        { max-width: min(100%, calc(100vw - 34px)); }
    }

    @media (hover: none) { *, a, button { cursor: default !important; } }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">Ask Star</div>
      <a class="back" href="dashboard.html">Back to dashboard</a>
    </header>

    <section id="feed" class="feed" aria-live="polite">
      <div id="feedInner" class="feed-inner"></div>
    </section>

    <div class="composer-wrap">
      <form id="composer" class="composer">
        <textarea id="prompt" class="prompt" rows="1" placeholder="Message Ask Star..."></textarea>
        <button id="send" class="send" type="submit" aria-label="Send message">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M12 5L19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </button>
      </form>
      <p class="footer-note">Enter sends. Shift+Enter adds a new line. Teach: /teach question => answer</p>
    </div>
  </main>

  <script>
    /* ── Starfield canvas ── */
    (function () {
      const c = document.createElement('canvas');
      c.style.cssText = 'position:fixed;inset:0;z-index:0;pointer-events:none;';
      document.body.prepend(c);
      const ctx = c.getContext('2d');
      let W, H, stars = [];
      function init() {
        W = c.width  = window.innerWidth;
        H = c.height = window.innerHeight;
        stars = Array.from({ length: 90 }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.2 + 0.2,
          speed: Math.random() * 0.28 + 0.04,
          drift: (Math.random() - 0.5) * 0.15,
          op:    Math.random() * 0.42 + 0.12
        }));
      }
      function draw() {
        ctx.clearRect(0, 0, W, H);
        for (const s of stars) {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, 6.2832);
          ctx.fillStyle = `rgba(77,96,160,${s.op})`;
          ctx.fill();
          s.y -= s.speed;
          s.x += s.drift;
          if (s.y < -2)  { s.y = H + 2; s.x = Math.random() * W; }
          if (s.x < 0)    s.x = W;
          if (s.x > W)    s.x = 0;
        }
        requestAnimationFrame(draw);
      }
      init();
      draw();
      window.addEventListener('resize', init);
    })();

    const SESSION_KEY = "mvumi_session_v1";
    const sessionEmail = localStorage.getItem(SESSION_KEY) || sessionStorage.getItem(SESSION_KEY);
    if (!sessionEmail) {
      window.location.replace("index.html");
      throw new Error("no session");
    }

    const KNOWLEDGE_KEY = "stargen_mini_model_v1";

    const feed = document.getElementById("feed");
    const feedInner = document.getElementById("feedInner");
    const composer = document.getElementById("composer");
    const prompt = document.getElementById("prompt");
    const send = document.getElementById("send");

    const state = {
      messages: [
        {
          role: "assistant",
          content: "Ask Star mini model is ready. Teach me with /teach question => answer"
        }
      ],
      thinking: false,
      knowledge: []
    };

    function loadKnowledge() {
      try {
        const data = JSON.parse(localStorage.getItem(KNOWLEDGE_KEY) || "[]");
        if (!Array.isArray(data)) {
          return [];
        }
        return data.filter((item) => item && item.q && item.a).slice(0, 600);
      } catch {
        return [];
      }
    }

    function saveKnowledge() {
      localStorage.setItem(KNOWLEDGE_KEY, JSON.stringify(state.knowledge.slice(0, 600)));
    }

    function normalize(text) {
      return String(text || "")
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function overlapScore(a, b) {
      const aTokens = new Set(normalize(a).split(" ").filter(Boolean));
      const bTokens = new Set(normalize(b).split(" ").filter(Boolean));
      if (!aTokens.size || !bTokens.size) {
        return 0;
      }
      let overlap = 0;
      aTokens.forEach((token) => {
        if (bTokens.has(token)) {
          overlap += 1;
        }
      });
      return overlap / Math.max(aTokens.size, bTokens.size);
    }

    function bestLearnedAnswer(input) {
      const normalizedInput = normalize(input);
      if (!normalizedInput) {
        return null;
      }

      let best = null;
      let bestScore = 0;

      state.knowledge.forEach((item) => {
        const nq = normalize(item.q);
        if (!nq) {
          return;
        }
        const exact = normalizedInput === nq ? 1 : 0;
        const score = Math.max(exact, overlapScore(normalizedInput, nq));
        if (score > bestScore) {
          bestScore = score;
          best = item;
        }
      });

      if (best && bestScore >= 0.45) {
        return best.a;
      }
      return null;
    }

    function handleTeachCommand(input) {
      const match = input.match(/^\s*\/teach\s+(.+?)\s*=>\s*(.+)\s*$/i);
      if (!match) {
        return null;
      }

      const q = match[1].trim();
      const a = match[2].trim();
      if (!q || !a) {
        return "Teaching failed. Use: /teach question => answer";
      }

      const normalizedQ = normalize(q);
      const existing = state.knowledge.find((item) => normalize(item.q) === normalizedQ);
      if (existing) {
        existing.a = a;
      } else {
        state.knowledge.unshift({ q, a });
      }

      saveKnowledge();
      return `Learned: "${q}"`;
    }

    function handleForgetCommand(input) {
      const match = input.match(/^\s*\/forget\s+(.+)\s*$/i);
      if (!match) {
        return null;
      }

      const q = match[1].trim();
      const normalizedQ = normalize(q);
      const before = state.knowledge.length;
      state.knowledge = state.knowledge.filter((item) => normalize(item.q) !== normalizedQ);
      saveKnowledge();

      if (state.knowledge.length < before) {
        return `Forgot: "${q}"`;
      }
      return `I did not find that memory. Try /list to see what I learned.`;
    }

    function handleListCommand(input) {
      if (!/^\s*\/list\s*$/i.test(input)) {
        return null;
      }

      if (!state.knowledge.length) {
        return "I have no learned items yet. Teach me with /teach question => answer";
      }

      const preview = state.knowledge
        .slice(0, 12)
        .map((item, index) => `${index + 1}. ${item.q}`)
        .join("\n");
      return `Learned prompts:\n${preview}`;
    }

    async function callMiniModel(input) {
      const teachReply = handleTeachCommand(input);
      if (teachReply) {
        return teachReply;
      }

      const forgetReply = handleForgetCommand(input);
      if (forgetReply) {
        return forgetReply;
      }

      const listReply = handleListCommand(input);
      if (listReply) {
        return listReply;
      }

      const learned = bestLearnedAnswer(input);
      if (learned) {
        return learned;
      }

      const normalized = normalize(input);
      if (/\b(hi|hello|hey)\b/.test(normalized)) {
        return "Hi. Teach me anything with /teach question => answer and I will remember it.";
      }
      if (/\b(who are you|what are you)\b/.test(normalized)) {
        return "I am your local mini model for Ask Star. I run in your browser and learn from your commands.";
      }
      if (/\b(help|how)\b/.test(normalized)) {
        return [
          "Commands:",
          "/teach question => answer",
          "/forget question",
          "/list"
        ].join("\n");
      }

      return "I do not know that yet. Teach me using /teach your question => your answer";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function autoResize() {
      prompt.style.height = "0px";
      prompt.style.height = Math.min(prompt.scrollHeight, 220) + "px";
    }

    function scrollToBottom() {
      feed.scrollTop = feed.scrollHeight;
    }

    function render() {
      feedInner.innerHTML = "";

      state.messages.forEach((message) => {
        const wrapper = document.createElement("article");
        wrapper.className = "message " + (message.role === "user" ? "user" : "assistant");

        const content = document.createElement("div");
        content.className = "content";
        content.innerHTML = escapeHtml(message.content);
        wrapper.appendChild(content);
        feedInner.appendChild(wrapper);
      });

      if (state.thinking) {
        const wrapper = document.createElement("article");
        wrapper.className = "message assistant";
        const content = document.createElement("div");
        content.className = "content";
        content.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
        wrapper.appendChild(content);
        feedInner.appendChild(wrapper);
      }

      scrollToBottom();
    }

    async function handleSubmit() {
      const text = prompt.value.trim();
      if (!text || state.thinking) {
        return;
      }

      state.messages.push({ role: "user", content: text });
      state.thinking = true;
      send.disabled = true;
      prompt.value = "";
      autoResize();
      render();

      try {
        await new Promise((resolve) => setTimeout(resolve, 260));
        const assistantText = await callMiniModel(text);
        state.messages.push({ role: "assistant", content: assistantText });
      } catch (error) {
        state.messages.push({
          role: "assistant",
          content: "Error: " + (error && error.message ? error.message : "Mini model failed.")
        });
      } finally {
        state.thinking = false;
        send.disabled = false;
        render();
        prompt.focus();
      }
    }

    composer.addEventListener("submit", async (event) => {
      event.preventDefault();
      await handleSubmit();
    });

    prompt.addEventListener("input", autoResize);
    prompt.addEventListener("keydown", async (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        await handleSubmit();
      }
    });

    state.knowledge = loadKnowledge();
    autoResize();
    render();
  </script>
</body>
</html>
