<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASK STAR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fff4d6;
      --ink: #111;
      --line: #111;
      --panel: #fffdf6;
      --user: #dff4ff;
      --ai: #ffe8dc;
      --accent: #ff6a3d;
      --shadow: 6px 6px 0 #111;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: "Space Grotesk", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(255, 106, 61, 0.22), transparent 28%),
        radial-gradient(circle at 88% 90%, rgba(46, 196, 255, 0.22), transparent 30%),
        var(--bg);
      color: var(--ink);
      padding: 16px;
    }

    .app {
      max-width: 980px;
      margin: 0 auto;
      min-height: calc(100vh - 32px);
      border: 4px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 12px;
    }

    .top {
      border: 3px solid var(--line);
      background: #fff;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .title {
      font-family: "Bebas Neue", sans-serif;
      font-size: 44px;
      line-height: 0.9;
      letter-spacing: 0.6px;
    }

    .back {
      border: 3px solid var(--line);
      background: #fff;
      color: var(--ink);
      text-decoration: none;
      font-weight: 700;
      font-size: 12px;
      min-height: 38px;
      padding: 8px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .chat {
      border: 3px solid var(--line);
      background: #fff;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      border: 3px solid var(--line);
      padding: 10px;
      max-width: min(760px, 96%);
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.45;
    }

    .msg.user { margin-left: auto; background: var(--user); }
    .msg.ai { margin-right: auto; background: var(--ai); }

    .meta {
      font-size: 11px;
      font-weight: 700;
      display: block;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .composer {
      border: 3px solid var(--line);
      background: #fff;
      padding: 10px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    textarea {
      width: 100%;
      min-height: 68px;
      max-height: 220px;
      resize: vertical;
      border: 3px solid var(--line);
      background: #fffef8;
      padding: 10px;
      font: inherit;
      font-size: 14px;
      outline: none;
    }

    .send {
      min-width: 132px;
      border: 4px solid var(--line);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      box-shadow: 4px 4px 0 var(--line);
      cursor: pointer;
      padding: 10px;
    }

    .send:disabled { opacity: 0.8; box-shadow: none; }

    @media (max-width: 640px) {
      .title { font-size: 36px; }
      .composer { grid-template-columns: 1fr; }
      .send { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <h1 class="title">ASK STAR</h1>
      <a class="back" href="dashboard.html">BACK TO DASHBOARD</a>
    </header>

    <section id="chat" class="chat" aria-live="polite"></section>

    <form id="composer" class="composer">
      <textarea id="prompt" placeholder="Ask anything..."></textarea>
      <button id="send" class="send" type="submit">ASK STAR</button>
    </form>
  </main>

  <script>
    const SESSION_KEY = "mvumi_session_v1";
    const sessionEmail = localStorage.getItem(SESSION_KEY) || sessionStorage.getItem(SESSION_KEY);
    if (!sessionEmail) {
      window.location.replace("index.html");
      throw new Error("no session");
    }

    const chatEl = document.getElementById("chat");
    const composer = document.getElementById("composer");
    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("send");

    const state = {
      messages: [
        { role: "assistant", text: "ASK STAR is ready. What do you want to generate today?" }
      ]
    };

    function esc(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function render() {
      chatEl.innerHTML = "";
      state.messages.forEach((m) => {
        const item = document.createElement("article");
        item.className = "msg " + (m.role === "user" ? "user" : "ai");
        item.innerHTML = `<span class="meta">${m.role === "user" ? "You" : "Star"}</span>${esc(m.text)}`;
        chatEl.appendChild(item);
      });
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function reply(prompt) {
      const p = prompt.toLowerCase();
      if (/tagline|slogan/.test(p)) {
        return "Here are 3 quick taglines:\n1. Built Local. Built Strong.\n2. Zimbabwe Moves With You.\n3. Big Results, Homegrown Energy.";
      }
      if (/post|facebook|instagram|whatsapp/.test(p)) {
        return "Social post draft:\n\"Big ideas. Local power. Ready to grow with us this week? Message us now and let's build momentum together.\"";
      }
      if (/plan|strategy/.test(p)) {
        return "Simple 5-step plan:\n1. Define audience\n2. Set one offer\n3. Publish daily content\n4. Push WhatsApp CTA\n5. Review and scale winners";
      }
      return "I can generate taglines, posts, and campaign plans. Ask me with your brand + goal.";
    }

    composer.addEventListener("submit", async (event) => {
      event.preventDefault();
      const text = promptEl.value.trim();
      if (!text) return;

      state.messages.push({ role: "user", text });
      promptEl.value = "";
      render();

      sendBtn.disabled = true;
      await new Promise((resolve) => setTimeout(resolve, 280));
      state.messages.push({ role: "assistant", text: reply(text) });
      sendBtn.disabled = false;
      render();
    });

    render();
  </script>
</body>
</html>
