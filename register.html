<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Register - MVUMI</title>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
	<style>
		:root {
			--yellow: #FFE500;
			--black: #000;
			--card: #FAFAFA;
			--error: #FF2D2D;
			--surface: #FFFFFF;
			--btn-bg: #000;
			--btn-ink: #FFE500;
		}
		* { box-sizing: border-box; margin: 0; padding: 0; font-family: "Space Mono", monospace; }
		body {
			min-height: 100vh;
			background: var(--yellow);
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 20px;
		}
		.card {
			width: min(440px, 100%);
			border: 4px solid var(--black);
			background: var(--card);
			box-shadow: 8px 8px 0 var(--black);
			padding: 28px 20px;
		}
		h1 {
			font-family: "Bebas Neue", sans-serif;
			font-size: 50px;
			line-height: 0.9;
			margin-bottom: 14px;
		}
		.field { margin-bottom: 12px; }
		.field input {
			width: 100%;
			min-height: 48px;
			border: 4px solid var(--black);
			background: var(--surface);
			padding: 10px 12px;
			font-size: 15px;
		}
		.btn {
			width: 100%;
			min-height: 52px;
			border: 4px solid var(--black);
			background: var(--btn-bg);
			color: var(--btn-ink);
			font-weight: 700;
			padding: 10px 12px;
			box-shadow: 5px 5px 0 var(--black);
			cursor: pointer;
		}
		.btn:disabled { opacity: 0.85; box-shadow: none; }
		.message {
			min-height: 22px;
			margin-top: 10px;
			font-size: 13px;
			font-weight: 700;
			color: var(--error);
		}
		.small {
			margin-top: 10px;
			font-size: 12px;
			text-align: center;
		}
		.small a { color: var(--black); font-weight: 700; text-decoration: none; }
		#otpPanel { display: none; margin-top: 10px; }
		@media (max-width: 520px) {
			h1 { font-size: 42px; }
			.card { padding: 22px 14px; }
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>REGISTER</h1>
		<form id="registerForm" novalidate>
			<div class="field"><input id="displayName" type="text" placeholder="Display name" required /></div>
			<div class="field"><input id="phone" type="tel" placeholder="Phone" required /></div>
			<div class="field"><input id="email" type="email" placeholder="Email" required /></div>
			<div class="field"><input id="password" type="password" placeholder="Password" required /></div>
			<div class="field"><input id="confirmPassword" type="password" placeholder="Confirm password" required /></div>
			<button class="btn" id="createBtn" type="submit">CREATE ACCOUNT</button>
			<p class="message" id="formMessage"></p>
		</form>

		<div id="otpPanel">
			<div class="field"><input id="otpCode" type="text" inputmode="numeric" maxlength="6" placeholder="Enter 6-digit code" /></div>
			<button class="btn" id="verifyBtn" type="button">VERIFY CODE</button>
			<button class="btn" id="resendBtn" type="button" style="margin-top:10px;">RESEND CODE</button>
			<p class="message" id="otpMessage"></p>
		</div>

		<p class="small">Already have an account? <a href="index.html">LOGIN</a></p>
	</main>

	<script src="auth-config.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	<script>
		const USER_KEY = "mvumi_users_v1";
		const SESSION_KEY = "mvumi_session_v1";
		const PENDING_KEY = "mvumi_pending_signup_v1";
		const ADMIN_EMAIL = "seanmvumi03@gmail.com";
		const SUPABASE_URL = window.SUPABASE_URL || "";
		const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || "";
		const supabase = (window.supabase && SUPABASE_URL && SUPABASE_ANON_KEY)
			? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
			: null;
		const EMAILJS_PUBLIC_KEY = window.EMAILJS_PUBLIC_KEY || "";
		const EMAILJS_SERVICE_ID = window.EMAILJS_SERVICE_ID || "";
		const EMAILJS_TEMPLATE_ID = window.EMAILJS_TEMPLATE_ID || "";

		const form = document.getElementById("registerForm");
		const createBtn = document.getElementById("createBtn");
		const formMessage = document.getElementById("formMessage");
		const otpPanel = document.getElementById("otpPanel");
		const verifyBtn = document.getElementById("verifyBtn");
		const resendBtn = document.getElementById("resendBtn");
		const otpMessage = document.getElementById("otpMessage");

		function routeAfterAuth(email) {
			window.location.replace("dashboard.html");
		}

		function isSupabaseConfigured() {
			return Boolean(supabase);
		}

		(async () => {
			if (isSupabaseConfigured()) {
				try {
					const { data, error } = await supabase.auth.getSession();
					if (!error && data && data.session && data.session.user && data.session.user.email) {
						localStorage.setItem(SESSION_KEY, data.session.user.email);
						routeAfterAuth(data.session.user.email);
						return;
					}
				} catch {}
			}

			if (localStorage.getItem(SESSION_KEY) || sessionStorage.getItem(SESSION_KEY)) {
				routeAfterAuth(localStorage.getItem(SESSION_KEY) || sessionStorage.getItem(SESSION_KEY));
			}
		})();

		function loadUsers() {
			try { return JSON.parse(localStorage.getItem(USER_KEY) || "[]"); }
			catch { return []; }
		}
		function canUseStorage(storage) {
			try {
				const probe = "__mvumi_storage_probe__";
				storage.setItem(probe, "1");
				storage.removeItem(probe);
				return true;
			} catch {
				return false;
			}
		}
		function saveUsers(users) {
			try {
				localStorage.setItem(USER_KEY, JSON.stringify(users));
				return true;
			} catch {
				return false;
			}
		}
		function savePending(p) { sessionStorage.setItem(PENDING_KEY, JSON.stringify(p)); }
		function loadPending() {
			try { return JSON.parse(sessionStorage.getItem(PENDING_KEY) || "null"); }
			catch { return null; }
		}
		function clearPending() { sessionStorage.removeItem(PENDING_KEY); }
		function setSession(email, remember = true) {
			try {
				if (remember) {
					localStorage.setItem(SESSION_KEY, email);
					sessionStorage.removeItem(SESSION_KEY);
					return true;
				}
				sessionStorage.setItem(SESSION_KEY, email);
				localStorage.removeItem(SESSION_KEY);
				return true;
			} catch {
				return false;
			}
		}
		function generateCode() { return Math.floor(100000 + Math.random() * 900000).toString(); }

		function isEmailJsConfigured() {
			return Boolean(EMAILJS_PUBLIC_KEY && EMAILJS_SERVICE_ID && EMAILJS_TEMPLATE_ID && window.emailjs);
		}

		async function sendCodeEmail(targetEmail, targetName, code) {
			if (!isEmailJsConfigured()) {
				return { ok: false, reason: "EMAILJS_NOT_CONFIGURED" };
			}

			window.emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
			const result = await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
				to_email: targetEmail,
				to_name: targetName || "User",
				otp_code: code,
				app_name: "MVUMI"
			});

			return { ok: result.status >= 200 && result.status < 300 };
		}

		async function hashPassword(text) {
			const bytes = new TextEncoder().encode(text);
			const digest = await crypto.subtle.digest("SHA-256", bytes);
			return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("");
		}

		form.addEventListener("submit", async (e) => {
			e.preventDefault();
			formMessage.textContent = "";
			formMessage.style.color = "var(--error)";

			if (!canUseStorage(localStorage) || !canUseStorage(sessionStorage)) {
				formMessage.textContent = "STORAGE IS BLOCKED IN THIS BROWSER. ENABLE COOKIES/SITE DATA TO REGISTER.";
				return;
			}

			const displayName = document.getElementById("displayName").value.trim();
			const phone = document.getElementById("phone").value.trim();
			const email = document.getElementById("email").value.trim().toLowerCase();
			const password = document.getElementById("password").value;
			const confirmPassword = document.getElementById("confirmPassword").value;

			if (!displayName || !phone || !email || !password || !confirmPassword) {
				formMessage.textContent = "ALL FIELDS ARE REQUIRED.";
				return;
			}
			if (password.length < 6) {
				formMessage.textContent = "PASSWORD MUST BE AT LEAST 6 CHARACTERS.";
				return;
			}
			if (password !== confirmPassword) {
				formMessage.textContent = "PASSWORDS DO NOT MATCH.";
				return;
			}
			if (!isSupabaseConfigured() && loadUsers().some((u) => (u.email || "").toLowerCase() === email)) {
				formMessage.textContent = "ACCOUNT ALREADY EXISTS. LOGIN INSTEAD.";
				return;
			}

			createBtn.disabled = true;
			createBtn.textContent = "CREATING...";
			const passwordHash = await hashPassword(password);
			const code = generateCode();
			savePending({
				displayName,
				phone,
				email,
				passwordRaw: password,
				passwordHash,
				code,
				expiresAt: Date.now() + 10 * 60 * 1000
			});

			let emailSent = false;
			try {
				const emailResult = await sendCodeEmail(email, displayName, code);
				emailSent = emailResult.ok;
			} catch {
				emailSent = false;
			}

			createBtn.disabled = false;
			createBtn.textContent = "CREATE ACCOUNT";

			form.style.display = "none";
			otpPanel.style.display = "block";
			if (emailSent) {
				otpMessage.style.color = "#000";
				otpMessage.textContent = "CODE SENT TO YOUR EMAIL. ENTER IT BELOW.";
			} else {
				otpMessage.style.color = "var(--error)";
				otpMessage.textContent = `EMAIL SEND FAILED/NOT SET. USE THIS CODE: ${code}`;
			}
		});

		verifyBtn.addEventListener("click", async () => {
			const code = document.getElementById("otpCode").value.trim();
			const pending = loadPending();
			otpMessage.style.color = "var(--error)";

			if (!pending) { otpMessage.textContent = "NO PENDING REGISTRATION. REGISTER AGAIN."; return; }
			if (Date.now() > pending.expiresAt) { otpMessage.textContent = "CODE EXPIRED. GENERATE NEW CODE."; return; }
			if (code !== pending.code) { otpMessage.textContent = "INVALID CODE."; return; }

			if (isSupabaseConfigured()) {
				if (!pending.passwordRaw) {
					otpMessage.textContent = "MISSING PASSWORD FOR CLOUD SIGNUP. REGISTER AGAIN.";
					return;
				}

				const { data, error } = await supabase.auth.signUp({
					email: pending.email,
					password: pending.passwordRaw,
					options: {
						data: {
							display_name: pending.displayName,
							phone: pending.phone
						}
					}
				});

				if (error) {
					otpMessage.textContent = "SIGNUP FAILED: " + error.message;
					return;
				}

				let signedInEmail = data && data.user ? data.user.email : pending.email;
				if (!(data && data.session)) {
					const signInResult = await supabase.auth.signInWithPassword({
						email: pending.email,
						password: pending.passwordRaw
					});
					if (signInResult.error || !signInResult.data || !signInResult.data.user) {
						otpMessage.textContent = "ACCOUNT CREATED. CHECK EMAIL TO CONFIRM, THEN LOGIN.";
						clearPending();
						return;
					}
					signedInEmail = signInResult.data.user.email;
				}

				if (!setSession(signedInEmail, true)) {
					otpMessage.textContent = "ACCOUNT CREATED, BUT SESSION COULD NOT BE SAVED.";
					return;
				}
			} else {
				const users = loadUsers();
				users.push({
					email: pending.email,
					display_name: pending.displayName,
					phone: pending.phone,
					passwordHash: pending.passwordHash,
					created_at: new Date().toISOString()
				});
				if (!saveUsers(users)) {
					otpMessage.style.color = "var(--error)";
					otpMessage.textContent = "COULD NOT SAVE ACCOUNT. CHECK BROWSER STORAGE SETTINGS.";
					return;
				}
				if (!setSession(pending.email, true)) {
					otpMessage.style.color = "var(--error)";
					otpMessage.textContent = "ACCOUNT CREATED, BUT SESSION COULD NOT BE SAVED.";
					return;
				}
			}
			clearPending();

			otpMessage.style.color = "#000";
			otpMessage.textContent = "VERIFIED. REDIRECTING...";
			setTimeout(() => routeAfterAuth(pending.email), 450);
		});

		resendBtn.addEventListener("click", async () => {
			const pending = loadPending();
			if (!pending) {
				otpMessage.style.color = "var(--error)";
				otpMessage.textContent = "NO PENDING REGISTRATION. REGISTER AGAIN.";
				return;
			}

			resendBtn.disabled = true;
			resendBtn.textContent = "SENDING...";
			pending.code = generateCode();
			pending.expiresAt = Date.now() + 10 * 60 * 1000;
			savePending(pending);

			let emailSent = false;
			try {
				const emailResult = await sendCodeEmail(pending.email, pending.displayName, pending.code);
				emailSent = emailResult.ok;
			} catch {
				emailSent = false;
			}

			resendBtn.disabled = false;
			resendBtn.textContent = "RESEND CODE";

			if (emailSent) {
				otpMessage.style.color = "#000";
				otpMessage.textContent = "NEW CODE SENT TO EMAIL.";
			} else {
				otpMessage.style.color = "var(--error)";
				otpMessage.textContent = `EMAIL SEND FAILED/NOT SET. NEW CODE: ${pending.code}`;
			}
		});
	</script>
</body>
</html>
