<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — MVUMI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root { --yellow:#FFE500; --black:#000; --paper:#FAFAFA; --error:#FF2D2D; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Space Mono", monospace; }
    body { min-height: 100vh; background: var(--yellow); display: flex; align-items: center; justify-content: center; padding: 24px 16px; }

    .dash {
      width: min(720px, 100%); border: 4px solid var(--black); background: var(--paper);
      box-shadow: 8px 8px 0 var(--black); padding: 32px; animation: cardIn 0.5s ease-out both;
    }
    h1 { font-family: "Bebas Neue", sans-serif; font-size: 52px; line-height: 0.9; margin-bottom: 8px; }
    .user-info { margin-bottom: 20px; }
    .user-info p { font-weight: 700; margin-bottom: 4px; font-size: 14px; }

    .panel {
      border: 4px solid var(--black); background: #fff; padding: 20px; margin-bottom: 16px;
    }
    .panel p { font-size: 14px; line-height: 1.5; }

    .apps-chooser {
      margin-top: 14px;
      margin-bottom: 8px;
      border: 3px solid var(--black);
      background: #fff;
      padding: 14px;
    }

    .apps-title {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 10px;
    }

    .apps-orbit {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .app-orb {
      width: 150px;
      height: 150px;
      border: 4px solid var(--black);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      color: var(--black);
      background: #fff;
      box-shadow: 6px 6px 0 var(--black);
      padding: 16px;
      line-height: 1.2;
      font-weight: 700;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }

    .app-orb:hover {
      transform: translate(-2px, -2px);
      box-shadow: 8px 8px 0 var(--black);
      background: var(--yellow);
    }

    .app-orb.cv {
      background: #fff;
    }

    .app-orb.ai {
      background: #e8f8ff;
    }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      border: 4px solid var(--black); background: var(--black); color: var(--yellow);
      text-decoration: none; padding: 12px 16px; font-weight: 700; font-size: 14px;
      cursor: pointer; box-shadow: 5px 5px 0 var(--black); min-height: 48px;
      transition: background 0.15s, color 0.15s;
    }
    .btn:hover { background: var(--yellow); color: var(--black); }
    .btn.admin-btn { background: var(--yellow); color: var(--black); }
    .btn.admin-btn:hover { background: var(--black); color: var(--yellow); }

    .status { margin-top: 10px; color: var(--error); font-weight: 700; min-height: 20px; font-size: 13px; }
    #adminSection { display: none; }

    @keyframes cardIn { 0%{opacity:0;transform:translateY(30px)} 100%{opacity:1;transform:translateY(0)} }

    @media (max-width: 520px) {
      .dash { padding: 22px 16px; }
      h1 { font-size: 40px; }
      .actions { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
      .app-orb { width: 130px; height: 130px; font-size: 12px; }
    }
    @media (hover: none) { *, a, button { cursor: default !important; } }
  </style>
</head>
<body>
  <main class="dash">
    <h1>MVUMI<br/>DASHBOARD</h1>

    <div class="user-info" id="userInfo">
      <p>Loading session...</p>
    </div>

    <section class="panel">
      <p>Welcome to your protected dashboard. Only authenticated users can access this page.</p>

      <div class="apps-chooser" aria-label="App chooser">
        <p class="apps-title">CHOOSE AN APP:</p>
        <div class="apps-orbit">
          <a class="app-orb cv" href="cv-maker.html">AI CV<br/>MAKER</a>
          <a class="app-orb ai" href="stargenzimbabwe.html">StarGEN<br/>zimbabwe</a>
        </div>
      </div>

      <div class="actions" style="margin-top:10px;">
        <button class="btn" id="enrollBioBtn" type="button">ENABLE FINGERPRINT</button>
        <button class="btn" id="removeBioBtn" type="button">REMOVE FINGERPRINT</button>
      </div>

      <div class="actions">
        <a class="btn" href="index.html">BACK TO LOGIN</a>
        <button class="btn" id="logoutBtn" type="button">LOGOUT</button>
        <div id="adminSection">
          <a class="btn admin-btn" href="admin.html">★ ADMIN PANEL</a>
        </div>
      </div>

      <p class="status" id="status"></p>
    </section>
  </main>

  <script src="auth-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const USER_KEY = "mvumi_users_v1";
    const SESSION_KEY = "mvumi_session_v1";
    const ADMIN_EMAIL = "seanmvumi03@gmail.com";
    const SUPABASE_URL = window.SUPABASE_URL || "";
    const SUPABASE_ANON_KEY = window.SUPABASE_ANON_KEY || "";
    let sbClient = null;
    try {
      const lib = window.supabase;
      const fn = lib && (lib.createClient || (lib.default && lib.default.createClient));
      if (fn && SUPABASE_URL && SUPABASE_ANON_KEY) {
        sbClient = fn(SUPABASE_URL, SUPABASE_ANON_KEY);
      }
    } catch (e) {
      console.error("Supabase init failed:", e);
      sbClient = null;
    }

    const userInfo = document.getElementById("userInfo");
    const logoutBtn = document.getElementById("logoutBtn");
    const statusEl = document.getElementById("status");
    const adminSection = document.getElementById("adminSection");
    const enrollBioBtn = document.getElementById("enrollBioBtn");
    const removeBioBtn = document.getElementById("removeBioBtn");
    let user = null;
    let usingSupabase = Boolean(sbClient);

    function loadUsers() {
      try { return JSON.parse(localStorage.getItem(USER_KEY) || "[]"); }
      catch { return []; }
    }

    function saveUsers(nextUsers) {
      localStorage.setItem(USER_KEY, JSON.stringify(nextUsers));
    }

    function esc(str) {
      return String(str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function setSessionMirror(email) {
      localStorage.setItem(SESSION_KEY, email);
      sessionStorage.removeItem(SESSION_KEY);
    }

    function clearSessionMirror() {
      localStorage.removeItem(SESSION_KEY);
      sessionStorage.removeItem(SESSION_KEY);
    }

    function bytesToB64Url(bytes) {
      const binary = String.fromCharCode(...bytes);
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function randomChallenge(size = 32) {
      const buffer = new Uint8Array(size);
      crypto.getRandomValues(buffer);
      return buffer;
    }

    function renderUserInfo(currentUser) {
      const name = currentUser.display_name || "User";
      const escapedEmail = esc(currentUser.email);
      const escapedName = esc(name);
      const escapedPhone = esc(currentUser.phone || "");

      userInfo.innerHTML =
        `<p>SIGNED IN AS: <strong>${escapedEmail}</strong></p>` +
        `<p>NAME: ${escapedName}</p>` +
        (escapedPhone ? `<p>PHONE: ${escapedPhone}</p>` : "") +
        `<p>FINGERPRINT: ${currentUser.biometricCredentialId ? "ENABLED" : "NOT SET"}</p>`;

      if ((currentUser.email || "").toLowerCase() === ADMIN_EMAIL.toLowerCase()) {
        adminSection.style.display = "block";
      }
    }

    async function initCurrentUser() {
      if (usingSupabase) {
        try {
          const { data, error } = await sbClient.auth.getSession();
          const sessionUser = !error && data && data.session ? data.session.user : null;
          if (sessionUser && sessionUser.email) {
            setSessionMirror(sessionUser.email);
            user = {
              email: sessionUser.email,
              display_name: (sessionUser.user_metadata && sessionUser.user_metadata.display_name) || "User",
              phone: (sessionUser.user_metadata && sessionUser.user_metadata.phone) || "",
              biometricCredentialId: (sessionUser.user_metadata && sessionUser.user_metadata.biometricCredentialId) || ""
            };
            renderUserInfo(user);
            enrollBioBtn.disabled = true;
            removeBioBtn.disabled = true;
            statusEl.style.color = "#000";
            statusEl.textContent = "FINGERPRINT FEATURES ARE DISABLED IN SUPABASE MODE.";
            return;
          }
        } catch {}
      }

      /* If Supabase is configured but has no cloud session, don't fall back to stale local data */
      if (Boolean(sbClient)) {
        clearSessionMirror();
        window.location.replace("index.html");
        throw new Error("no supabase session");
      }

      usingSupabase = false;
      const sessionEmail = localStorage.getItem(SESSION_KEY) || sessionStorage.getItem(SESSION_KEY);
      if (!sessionEmail) {
        window.location.replace("index.html");
        throw new Error("no session");
      }

      const users = loadUsers();
      user = users.find((u) => (u.email || "").toLowerCase() === sessionEmail.toLowerCase());
      if (!user) {
        clearSessionMirror();
        window.location.replace("index.html");
        throw new Error("session user missing");
      }

      renderUserInfo(user);
    }

    enrollBioBtn.addEventListener("click", async () => {
      if (!user || usingSupabase) {
        statusEl.textContent = "FINGERPRINT SETUP IS AVAILABLE ONLY IN LOCAL MODE.";
        return;
      }
      if (!window.PublicKeyCredential || !navigator.credentials) {
        statusEl.textContent = "FINGERPRINT NOT SUPPORTED ON THIS DEVICE/BROWSER.";
        return;
      }

      try {
        enrollBioBtn.disabled = true;
        enrollBioBtn.textContent = "SCANNING...";
        statusEl.textContent = "Confirm fingerprint on your device...";

        const credential = await navigator.credentials.create({
          publicKey: {
            challenge: randomChallenge(),
            rp: { name: "MVUMI" },
            user: {
              id: new TextEncoder().encode(user.email),
              name: user.email,
              displayName: user.display_name || user.email
            },
            pubKeyCredParams: [
              { type: "public-key", alg: -7 },
              { type: "public-key", alg: -257 }
            ],
            authenticatorSelection: {
              authenticatorAttachment: "platform",
              userVerification: "required",
              residentKey: "preferred"
            },
            timeout: 60000,
            attestation: "none"
          }
        });

        if (!credential || !credential.rawId) {
          statusEl.textContent = "FINGERPRINT ENROLLMENT FAILED.";
          return;
        }

        const usersNow = loadUsers();
        const idx = usersNow.findIndex((u) => (u.email || "").toLowerCase() === user.email.toLowerCase());
        if (idx === -1) {
          statusEl.textContent = "ACCOUNT NOT FOUND.";
          return;
        }

        usersNow[idx].biometricCredentialId = bytesToB64Url(new Uint8Array(credential.rawId));
        saveUsers(usersNow);
        statusEl.style.color = "#000";
        statusEl.textContent = "FINGERPRINT ENABLED. YOU CAN NOW USE FINGERPRINT LOGIN.";
      } catch (error) {
        statusEl.style.color = "var(--error)";
        statusEl.textContent = "FINGERPRINT SETUP FAILED: " + (error.name || "UNKNOWN_ERROR");
      } finally {
        enrollBioBtn.disabled = false;
        enrollBioBtn.textContent = "ENABLE FINGERPRINT";
      }
    });

    removeBioBtn.addEventListener("click", () => {
      if (!user || usingSupabase) {
        statusEl.textContent = "FINGERPRINT SETUP IS AVAILABLE ONLY IN LOCAL MODE.";
        return;
      }
      const usersNow = loadUsers();
      const idx = usersNow.findIndex((u) => (u.email || "").toLowerCase() === user.email.toLowerCase());
      if (idx === -1) {
        statusEl.textContent = "ACCOUNT NOT FOUND.";
        return;
      }

      delete usersNow[idx].biometricCredentialId;
      saveUsers(usersNow);
      statusEl.style.color = "#000";
      statusEl.textContent = "FINGERPRINT REMOVED.";
    });

    /* ── Logout ── */
    logoutBtn.addEventListener("click", async () => {
      statusEl.textContent = "Logging out...";
      if (usingSupabase && sbClient) {
        try { await sbClient.auth.signOut(); } catch {}
      }
      clearSessionMirror();
      window.location.replace("index.html");
    });

    initCurrentUser();
  </script>
</body>
</html>
