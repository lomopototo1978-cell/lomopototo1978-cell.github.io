<!doctype html>
<!-- v3 ChatGPT-style light UI with local mini model -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Ask Star</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #0d0d0d;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky; top: 0; z-index: 10;
      padding: 12px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 16px;
      font-weight: 600;
      color: #0d0d0d;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #10a37f;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.85); }
    }

    .back-link {
      font-size: 13px;
      color: #666;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }

    .back-link:hover {
      background: #f0f0f0;
      color: #0d0d0d;
    }

    /* ── Feed ── */
    .feed {
      overflow-y: auto;
      scroll-behavior: smooth;
    }

    .feed-inner {
      max-width: 768px;
      margin: 0 auto;
      padding: 24px 24px 140px;
    }

    /* ── Messages ── */
    .msg {
      padding: 20px 0;
      animation: fadeSlide 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .msg + .msg {
      border-top: 1px solid #f0f0f0;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-row {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .msg.user .msg-row {
      flex-direction: row-reverse;
    }

    /* Avatar */
    .avatar {
      width: 30px; height: 30px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .msg.assistant .avatar {
      background: #10a37f;
      color: #fff;
    }

    .msg.user .avatar {
      background: #e8e8e8;
      color: #555;
    }

    /* Text */
    .msg-text {
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      flex: 1;
      min-width: 0;
    }

    .msg.user .msg-text {
      background: #f7f7f8;
      border-radius: 18px 18px 4px 18px;
      padding: 12px 16px;
      max-width: min(520px, calc(100vw - 100px));
    }

    .msg.assistant .msg-text {
      padding-top: 3px;
    }

    /* ── Streaming cursor ── */
    .streaming-cursor::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 18px;
      margin-left: 2px;
      background: #10a37f;
      border-radius: 1px;
      vertical-align: text-bottom;
      animation: blink 0.7s steps(2) infinite;
    }

    @keyframes blink {
      0%   { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── Typing dots ── */
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-dots span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #999;
      animation: dotBounce 1s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%           { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Composer ── */
    .composer-area {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 12px 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, #fff 20%);
    }

    .composer-box {
      max-width: 768px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border: 1px solid #d9d9d9;
      border-radius: 24px;
      padding: 8px 12px 8px 16px;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    .composer-box:focus-within {
      border-color: #10a37f;
      box-shadow: 0 0 0 2px rgba(16,163,127,0.15), 0 2px 12px rgba(0,0,0,0.08);
    }

    .input-field {
      flex: 1;
      border: 0;
      outline: none;
      resize: none;
      font: inherit;
      font-size: 15px;
      line-height: 1.5;
      min-height: 24px;
      max-height: 200px;
      background: transparent;
      color: #0d0d0d;
      overflow-y: auto;
    }

    .input-field::placeholder { color: #999; }

    .send-btn {
      width: 36px; height: 36px;
      border: 0;
      border-radius: 50%;
      background: #0d0d0d;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.15s, opacity 0.15s;
    }

    .send-btn:hover:not(:disabled) {
      background: #10a37f;
      transform: scale(1.06);
    }

    .send-btn:active:not(:disabled) {
      transform: scale(0.92);
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .send-btn svg { width: 16px; height: 16px; }

    .composer-hint {
      max-width: 768px;
      margin: 6px auto 0;
      text-align: center;
      font-size: 11px;
      color: #aaa;
    }

    /* ── Scrollbar ── */
    .feed::-webkit-scrollbar       { width: 6px; }
    .feed::-webkit-scrollbar-track { background: transparent; }
    .feed::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
    .feed::-webkit-scrollbar-thumb:hover { background: #ccc; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .feed-inner { padding: 16px 14px 148px; }
      .msg-row    { gap: 10px; }
      .msg.user .msg-text { max-width: calc(100vw - 74px); }
      .composer-area { padding: 8px 10px; }
      .composer-box  { padding: 6px 10px 6px 14px; }
    }

    @media (hover: none) { *, a, button { cursor: default !important; } }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand"><span class="brand-dot"></span> Ask Star</div>
      <a class="back-link" href="dashboard.html">Dashboard</a>
    </header>

    <section id="feed" class="feed">
      <div id="feedInner" class="feed-inner"></div>
    </section>

    <div class="composer-area">
      <form id="composer" class="composer-box" autocomplete="off">
        <textarea id="prompt" class="input-field" rows="1" placeholder="Message Ask Star..."></textarea>
        <button id="send" class="send-btn" type="submit" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none"><path d="M7 11L12 6L17 11M12 6V18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>
      <p class="composer-hint">Enter to send &middot; Shift+Enter for new line &middot; /teach question =&gt; answer</p>
    </div>
  </main>

      {q:"What is apartheid", a:"Apartheid was a system of institutionalised racial segregation in South Africa from 1948 to the early 1990s. It was dismantled through negotiations, leading to the first democratic elections in 1994."},
      {q:"When was the United Nations founded", a:"The United Nations was founded on 24 October 1945, after World War II, to promote international cooperation and prevent future conflicts. Its headquarters is in New York City."},

      // ── Technology ──
      {q:"What is artificial intelligence", a:"Artificial intelligence (AI) refers to computer systems designed to perform tasks that typically require human intelligence, such as learning, reasoning, problem-solving, and understanding language."},
      {q:"What is a computer", a:"A computer is an electronic device that processes data according to instructions (programs). Modern computers can perform billions of calculations per second and are used for everything from communication to scientific research."},
      {q:"What is programming", a:"Programming is the process of writing instructions (code) that a computer can execute to perform specific tasks. Popular programming languages include Python, JavaScript, Java, C++, and many others."},
      {q:"What is the World Wide Web", a:"The World Wide Web (WWW) was invented by Tim Berners-Lee in 1989. It is a system of interlinked hypertext documents accessed via the Internet using web browsers."},

      // ── More Africa/Zimbabwe extras ──
      {q:"What is the Zambezi River", a:"The Zambezi is the fourth-longest river in Africa at about 2,574 km. It flows through six countries and features Victoria Falls. Lake Kariba, the world's largest reservoir, is on the Zambezi."},
      {q:"What is the Kingdom of Mapungubwe", a:"The Kingdom of Mapungubwe (c. 1075-1220) was a pre-colonial state in Southern Africa, located at the confluence of the Limpopo and Shashe rivers. It was a precursor to the Great Zimbabwe civilization."},
      {q:"What was the Kingdom of Mutapa", a:"The Kingdom of Mutapa (c. 1450-1760) was a Shona kingdom that stretched across parts of modern Zimbabwe and Mozambique. It was known for gold trade and succeeded the Kingdom of Zimbabwe."},
      {q:"Who was Cecil Rhodes", a:"Cecil Rhodes (1853-1902) was a British mining magnate and politician who founded the British South Africa Company, which colonised the territory that became Rhodesia (now Zimbabwe and Zambia)."},
      {q:"What is the Matobo Hills", a:"The Matobo Hills (or Matopos) are a range of granite kopjes south of Bulawayo, Zimbabwe. They are a UNESCO World Heritage Site, known for San rock art and are the burial place of Cecil Rhodes."},
      {q:"What is the GDP of Zimbabwe", a:"Zimbabwe's GDP (PPP) is approximately $93.9 billion (2025 estimate), and its GDP (nominal) is approximately $53.3 billion. The GDP per capita (PPP) is about $5,410."},
      {q:"What is the time zone of Zimbabwe", a:"Zimbabwe is in the Central Africa Time (CAT) zone, which is UTC+2."},
      {q:"What is the calling code for Zimbabwe", a:"The international calling code for Zimbabwe is +263."},
      {q:"What animals are found in Africa", a:"Africa has the world's largest diversity of megafauna, including elephants, lions, leopards, rhinos, buffalo (the Big Five), giraffes, zebras, hippos, cheetahs, gorillas, and many more."},
      {q:"What is the Serengeti", a:"The Serengeti is a vast ecosystem in East Africa (mostly in Tanzania), famous for its annual migration of over 1.5 million wildebeest and hundreds of thousands of zebras and gazelles."},
      {q:"What is Mount Kilimanjaro", a:"Mount Kilimanjaro is the highest mountain in Africa at 5,895 metres (19,341 ft). It is a dormant volcano located in Tanzania near the Kenyan border."},
      {q:"What is the Great Rift Valley", a:"The Great Rift Valley is a continuous geographic trench running from Lebanon to Mozambique, about 6,000 km long. In Africa, it runs through Ethiopia, Kenya, Tanzania, and other countries."},
      {q:"What happened in the slave trade in Africa", a:"Between the 16th and 19th centuries, an estimated 7-12 million Africans were transported to the Americas through the transatlantic slave trade. It had devastating impacts on African societies and demographics."},
      {q:"What is the economy of Africa like", a:"Africa has abundant natural resources but remains the least wealthy continent. South Africa, Egypt, Algeria, Nigeria, and Morocco have the largest economies. The continent holds 90% of the world's cobalt and platinum."}
    ];

    const feed = document.getElementById("feed");
    const feedInner = document.getElementById("feedInner");
    const composer = document.getElementById("composer");
    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("send");

    const state = {
      messages: [],
      thinking: false,
      knowledge: []
    };

    function loadKnowledge() {
      try {
        const d = JSON.parse(localStorage.getItem(KNOWLEDGE_KEY) || "[]");
        const user = Array.isArray(d) ? d.filter(i => i && i.q && i.a).slice(0, 600) : [];
        /* Merge: user-taught knowledge takes priority, then fill with defaults */
        const seen = new Set(user.map(i => normalize(i.q)));
        const merged = [...user];
        DEFAULT_KNOWLEDGE.forEach(item => {
          if (!seen.has(normalize(item.q))) merged.push(item);
        });
        return merged.slice(0, 600);
      } catch { return [...DEFAULT_KNOWLEDGE]; }
    }

    function saveKnowledge() {
      localStorage.setItem(KNOWLEDGE_KEY, JSON.stringify(state.knowledge.slice(0, 600)));
    }

    function normalize(t) {
      return String(t || "").toLowerCase().replace(/[^a-z0-9\s]/g, " ").replace(/\s+/g, " ").trim();
    }

    function overlapScore(a, b) {
      const at = new Set(normalize(a).split(" ").filter(Boolean));
      const bt = new Set(normalize(b).split(" ").filter(Boolean));
      if (!at.size || !bt.size) return 0;
      let c = 0;
      at.forEach(t => { if (bt.has(t)) c++; });
      return c / Math.max(at.size, bt.size);
    }

    function bestLearnedAnswer(input) {
      const ni = normalize(input);
      if (!ni) return null;
      let best = null, bestS = 0;
      state.knowledge.forEach(item => {
        const nq = normalize(item.q);
        if (!nq) return;
        const s = Math.max(ni === nq ? 1 : 0, overlapScore(ni, nq));
        if (s > bestS) { bestS = s; best = item; }
      });
      return best && bestS >= 0.45 ? best.a : null;
    }

    function handleTeachCommand(input) {
      const m = input.match(/^\s*\/teach\s+(.+?)\s*=>\s*(.+)\s*$/i);
      if (!m) return null;
      const q = m[1].trim(), a = m[2].trim();
      if (!q || !a) return "Use: /teach question => answer";
      const nq = normalize(q);
      const ex = state.knowledge.find(i => normalize(i.q) === nq);
      if (ex) ex.a = a; else state.knowledge.unshift({ q, a });
      saveKnowledge();
      return 'Learned: "' + q + '"';
    }

    function handleForgetCommand(input) {
      const m = input.match(/^\s*\/forget\s+(.+)\s*$/i);
      if (!m) return null;
      const q = m[1].trim(), nq = normalize(q), len = state.knowledge.length;
      state.knowledge = state.knowledge.filter(i => normalize(i.q) !== nq);
      saveKnowledge();
      return state.knowledge.length < len ? 'Forgot: "' + q + '"' : "Not found. Try /list";
    }

    function handleListCommand(input) {
      if (!/^\s*\/list\s*$/i.test(input)) return null;
      if (!state.knowledge.length) return "Nothing learned yet. Use /teach question => answer";
      return "Learned:\n" + state.knowledge.slice(0, 15).map((v, i) => (i + 1) + ". " + v.q).join("\n");
    }

    function getReply(input) {
      let r;
      if ((r = handleTeachCommand(input)))  return r;
      if ((r = handleForgetCommand(input))) return r;
      if ((r = handleListCommand(input)))   return r;
      if ((r = bestLearnedAnswer(input)))   return r;
      const n = normalize(input);
      if (/\b(hi|hello|hey)\b/.test(n)) return "Hey! I know about Zimbabwe, Africa, science, and more. Try asking me something, or teach me with /teach question => answer";
      if (/\b(who are you|what are you)\b/.test(n)) return "I'm Ask Star — a local mini model that runs in your browser. I come pre-loaded with knowledge about Zimbabwe, Africa, science, geography, and more. You can also teach me new things!";
      if (/\b(help|how)\b/.test(n)) return "Commands:\n/teach question => answer\n/forget question\n/list\n\nOr just ask me a question!";
      return "I don't know that yet. Teach me with:\n/teach your question => your answer";
    }

    /* ── Escape HTML ── */
    function esc(v) {
      return String(v || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    /* ── Render all messages ── */
    function renderAll() {
      feedInner.innerHTML = "";
      state.messages.forEach(m => addMsgDom(m.role, m.content, false));
      if (state.thinking) addThinkingDom();
      scrollDown();
    }

    function addMsgDom(role, text, animate) {
      const article = document.createElement("article");
      article.className = "msg " + role;
      if (!animate) article.style.animation = "none";

      const row = document.createElement("div");
      row.className = "msg-row";

      const av = document.createElement("div");
      av.className = "avatar";
      av.textContent = role === "assistant" ? "\u2605" : sessionEmail.charAt(0).toUpperCase();

      const txt = document.createElement("div");
      txt.className = "msg-text";
      txt.innerHTML = esc(text);

      row.appendChild(av);
      row.appendChild(txt);
      article.appendChild(row);
      feedInner.appendChild(article);
      return txt;
    }

    function addThinkingDom() {
      const article = document.createElement("article");
      article.className = "msg assistant";
      article.id = "thinkingMsg";
      const row = document.createElement("div");
      row.className = "msg-row";
      const av = document.createElement("div");
      av.className = "avatar";
      av.textContent = "\u2605";
      const txt = document.createElement("div");
      txt.className = "msg-text";
      txt.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
      row.appendChild(av);
      row.appendChild(txt);
      article.appendChild(row);
      feedInner.appendChild(article);
    }

    function removeThinking() {
      const el = document.getElementById("thinkingMsg");
      if (el) el.remove();
    }

    function scrollDown() {
      feed.scrollTop = feed.scrollHeight;
    }

    /* ── Word-by-word streaming animation (like ChatGPT) ── */
    async function streamReply(fullText) {
      removeThinking();

      const txtEl = addMsgDom("assistant", "", true);
      txtEl.classList.add("streaming-cursor");

      const words = fullText.split(/(\s+)/);
      let rendered = "";

      for (let i = 0; i < words.length; i++) {
        rendered += words[i];
        txtEl.innerHTML = esc(rendered);
        scrollDown();
        if (words[i].trim()) {
          await new Promise(r => setTimeout(r, 28 + Math.random() * 32));
        }
      }

      txtEl.classList.remove("streaming-cursor");
      state.messages.push({ role: "assistant", content: fullText });
    }

    /* ── Submit ── */
    async function handleSubmit() {
      const text = promptEl.value.trim();
      if (!text || state.thinking) return;

      state.messages.push({ role: "user", content: text });
      state.thinking = true;
      sendBtn.disabled = true;
      promptEl.value = "";
      autoResize();

      addMsgDom("user", text, true);
      addThinkingDom();
      scrollDown();

      await new Promise(r => setTimeout(r, 400 + Math.random() * 300));

      const reply = getReply(text);
      state.thinking = false;

      await streamReply(reply);

      sendBtn.disabled = false;
      promptEl.focus();
    }

    /* ── Auto-resize textarea ── */
    function autoResize() {
      promptEl.style.height = "0px";
      promptEl.style.height = Math.min(promptEl.scrollHeight, 200) + "px";
    }

    /* ── Events ── */
    composer.addEventListener("submit", e => { e.preventDefault(); handleSubmit(); });
    promptEl.addEventListener("input", autoResize);
    promptEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSubmit(); }
    });

    /* ── Init ── */
    state.knowledge = loadKnowledge();
    state.messages.push({
      role: "assistant",
      content: "How can I help you today?\n\nI know about Zimbabwe, Africa, science, geography, history, and more. Ask me anything!\n\nYou can also teach me with /teach question => answer"
    });
    autoResize();
    renderAll();
  </script>
</body>
</html>
